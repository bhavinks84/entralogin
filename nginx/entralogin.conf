# EntraLogin – Nginx server block template
# Placeholders replaced by deploy.sh:
#   __DOMAIN__        → your domain name
#   __FRONTEND_DIST__ → absolute path to frontend/dist
#   __BACKEND_PORT__  → Express backend port (default 5000)
#
# To apply SSL after running deploy.sh:
#   sudo certbot --nginx -d __DOMAIN__

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # ── Static files (React SPA) ──────────────────────────────────────────
    root  __FRONTEND_DIST__;
    index index.html;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── API – proxy to Express backend ────────────────────────────────────
    location /api {
        proxy_pass         http://127.0.0.1:__BACKEND_PORT__;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # ── SPA fallback – serve index.html for all React routes ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
